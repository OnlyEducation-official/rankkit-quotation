name: Quotation App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

  deploy:
    needs: lint-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: delicate
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -e

            echo "➡️ Going to project directory"
            cd /home/delicate/apps/rankkit-quotation

            echo "➡️ Pulling latest code"
            git fetch origin
            git reset --hard origin/main

            echo "➡️ Installing dependencies"
            npm install

            echo "➡️ Cleaning previous build"
            rm -rf .next

            echo "➡️ Building app"
            npm run build

            echo "➡️ Restarting PM2 app"
            pm2 restart quotation-app --update-env || pm2 start npm --name quotation-app -- start

            echo "➡️ Saving PM2 process list"
            pm2 save

            echo "✅ Deployment successful"

  notify:
    needs: [lint-and-build, deploy]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Notify on failure
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: Quotation app build or deployment failed!
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}